<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>芳名用紙 パターン1（原枠マス目）</title>
<style>
  /* A6横向き: 148mm × 105mm */
  @page {
    size: A6 landscape;
    margin: 0;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Yu Gothic', 'Meiryo', 'Hiragino Kaku Gothic Pro', sans-serif;
    background: #f0f0f0;
    padding: 20px;
  }

  .page {
    width: 148mm;
    height: 105mm;
    background: white;
    margin: 0 auto 20px;
    padding: 6mm 7mm;
    position: relative;
    box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    overflow: hidden;
  }

  /* 印刷時は陰影なし・全画面 */
  @media print {
    body { background: white; padding: 0; }
    .page { box-shadow: none; margin: 0; page-break-after: always; }
    .print-caption { display: none; }
  }

  .page-title {
    font-size: 11pt;
    font-weight: bold;
    color: #1a1a2e;
    text-align: center;
    margin-bottom: 1mm;
  }

  .page-subtitle {
    font-size: 7pt;
    color: #666;
    text-align: center;
    margin-bottom: 2mm;
  }

  .mgmt-number {
    position: absolute;
    top: 5mm;
    right: 6mm;
    border: 2px solid #1a1a2e;
    padding: 1mm 3mm;
    font-size: 18pt;
    font-weight: bold;
    color: #c9a962;
    font-family: 'Arial Black', sans-serif;
    background: white;
  }

  .mgmt-label {
    font-size: 6pt;
    color: #666;
    display: block;
    text-align: center;
    font-weight: normal;
    color: #333;
  }

  .field-row {
    display: flex;
    align-items: center;
    gap: 2mm;
    margin-bottom: 1.8mm;
  }

  .label {
    font-size: 8pt;
    font-weight: bold;
    min-width: 14mm;
    color: #333;
  }

  /* マス目スタイル（1文字1マス） */
  .boxes {
    display: flex;
    gap: 0;
  }

  .box {
    width: 7mm;
    height: 7mm;
    border: 0.4mm solid #333;
    border-right: none;
  }

  .box:last-child {
    border-right: 0.4mm solid #333;
  }

  .boxes-small .box {
    width: 5.5mm;
    height: 5.5mm;
  }

  .hyphen {
    width: 2mm;
    text-align: center;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .relation-row {
    display: flex;
    gap: 3mm;
    align-items: center;
  }

  .checkbox-group {
    display: flex;
    gap: 2mm;
  }

  .checkbox-item {
    display: flex;
    align-items: center;
    gap: 0.8mm;
    font-size: 8pt;
  }

  .checkbox {
    width: 4mm;
    height: 4mm;
    border: 0.4mm solid #333;
  }

  .footer {
    position: absolute;
    bottom: 3mm;
    left: 7mm;
    right: 7mm;
    font-size: 6pt;
    color: #888;
    text-align: center;
    border-top: 0.2mm solid #ddd;
    padding-top: 1mm;
  }

  .print-caption {
    text-align: center;
    color: #666;
    font-size: 10pt;
    margin-bottom: 10px;
    max-width: 148mm;
    margin-left: auto;
    margin-right: auto;
  }
</style>
</head>
<body>

<div class="print-caption">
  <strong>パターン1: 原枠（マス目方式）</strong><br>
  1文字1マス → OCR精度が最も高い。書く側はやや時間がかかる。
</div>

<div class="page">
  <div class="mgmt-number">
    <span class="mgmt-label">管理番号</span>
    001
  </div>

  <div class="page-title">芳名帳</div>
  <div class="page-subtitle">ご記帳ありがとうございます</div>

  <div class="field-row">
    <div class="label">ふりがな</div>
    <div class="boxes boxes-small">
      <div class="box"></div><div class="box"></div><div class="box"></div><div class="box"></div>
      <div class="box"></div><div class="box"></div><div class="box"></div><div class="box"></div>
      <div class="box"></div><div class="box"></div><div class="box"></div><div class="box"></div>
    </div>
  </div>

  <div class="field-row">
    <div class="label">お名前</div>
    <div class="boxes">
      <div class="box"></div><div class="box"></div><div class="box"></div><div class="box"></div>
      <div class="box"></div><div class="box"></div><div class="box"></div><div class="box"></div>
      <div class="box"></div>
    </div>
  </div>

  <div class="field-row">
    <div class="label">郵便番号</div>
    <div class="boxes">
      <div class="box"></div><div class="box"></div><div class="box"></div>
      <div class="hyphen">-</div>
      <div class="box"></div><div class="box"></div><div class="box"></div><div class="box"></div>
    </div>
  </div>

  <div class="field-row">
    <div class="label">ご住所</div>
    <div class="boxes boxes-small">
      <div class="box"></div><div class="box"></div><div class="box"></div><div class="box"></div>
      <div class="box"></div><div class="box"></div><div class="box"></div><div class="box"></div>
      <div class="box"></div><div class="box"></div><div class="box"></div><div class="box"></div>
      <div class="box"></div><div class="box"></div><div class="box"></div><div class="box"></div>
      <div class="box"></div><div class="box"></div><div class="box"></div><div class="box"></div>
    </div>
  </div>

  <div style="display: flex; margin-top: 0.5mm;">
    <div class="label" style="min-width: 14mm;"></div>
    <div class="boxes boxes-small">
      <div class="box"></div><div class="box"></div><div class="box"></div><div class="box"></div>
      <div class="box"></div><div class="box"></div><div class="box"></div><div class="box"></div>
      <div class="box"></div><div class="box"></div><div class="box"></div><div class="box"></div>
      <div class="box"></div><div class="box"></div><div class="box"></div><div class="box"></div>
      <div class="box"></div><div class="box"></div><div class="box"></div><div class="box"></div>
    </div>
  </div>

  <div class="field-row" style="margin-top: 1.5mm;">
    <div class="label">ご関係</div>
    <div class="checkbox-group">
      <div class="checkbox-item"><div class="checkbox"></div>ご親族</div>
      <div class="checkbox-item"><div class="checkbox"></div>ご友人</div>
      <div class="checkbox-item"><div class="checkbox"></div>会社関係</div>
      <div class="checkbox-item"><div class="checkbox"></div>ご近所</div>
      <div class="checkbox-item"><div class="checkbox"></div>その他</div>
    </div>
  </div>

  <div class="footer">
    ※ 香典袋にもこの管理番号（右上）をご記入ください
  </div>
</div>

<div class="print-caption" style="margin-top: 20px;">
  ブラウザの印刷機能（Ctrl+P）→ 用紙サイズ「A6」→ 向き「横」で印刷できます
</div>

</body>
</html>
